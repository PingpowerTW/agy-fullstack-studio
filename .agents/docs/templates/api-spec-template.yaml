openapi: 3.0.3
info:
  title: Full-Stack Studio API Specification Template
  description: 標準全端 RESTful API OpenAPI 3.0 範本
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: 本地開發環境
paths:
  /examples:
    get:
      summary: 獲取範例資料列表
      description: 支援分頁與關鍵字過濾的 API
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: 成功返回範例列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: string
        '400':
          description: 請求參數錯誤
        '500':
          description: 伺服器內部錯誤
